    <main>
        <section>
            <h1>Entre em Contato</h1>
            <p>Se você tiver alguma dúvida ou quiser entrar em contato, preencha o formulário abaixo:</p>

            <form id="formContato">
                
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo">

                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="seuemail@exemplo.com">

                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" rows="5" placeholder="Escreva sua mensagem aqui..."></textarea>

                <button type="submit">Enviar Mensagem</button>

            </form>
        </section>
    </main>
